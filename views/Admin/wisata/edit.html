{{define "admin/wisata/edit"}}

{{template "admin_header.html" .}}

{{template "admin_sidebar.html" .}}

<div class="main">
    <div class="header">
        <h1>Edit Wisata</h1>
    </div>

    <form action="/admin/wisata/update/{{.Wisata.ID}}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Nama Wisata</label>
            <input type="text" name="nama_wisata" value="{{.Wisata.NamaWisata}}" required>
        </div>
        <div class="form-group">
            <label>Deskripsi</label>
            <textarea name="deskripsi" rows="5">{{.Wisata.Deskripsi}}</textarea>
        </div>
        <div class="form-group">
            <label>Lokasi</label>
            <input type="text" name="lokasi" value="{{.Wisata.Lokasi}}">
        </div>
        <div class="form-group">
            <label>Harga Tiket</label>
            <input type="text" name="harga_tiket" value="{{.Wisata.HargaTiket}}">
        </div>
        <div class="form-group">
            <label>Jam Operasional</label>
            <input type="text" name="jam_operasional" value="{{.Wisata.JamOperasional}}">
        </div>
        <div class="form-group">
            <label>Gambar</label>
            <input type="file" name="gambar">
            <small>Biarkan kosong jika tidak ingin mengganti gambar.</small>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="aktif" {{if eq .Wisata.Status "aktif"}}selected{{end}}>Aktif</option>
                <option value="tutup" {{if eq .Wisata.Status "tutup"}}selected{{end}}>Tutup</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{{ route "admin.wisata.index" }}" class="btn btn-secondary">Batal</a>
    </form>
</div>

{{template "footer.html" .}}

{{end}}
