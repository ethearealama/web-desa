{{define "admin/wisata/edit.html"}}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Wisata - Admin Desa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">
    {{template "admin_sidebar.html" .}}

    <div class="ml-64 flex-1">
        {{template "admin_header.html" .}}

        <div class="p-6 max-w-2xl">
            <div class="flex items-center gap-4 mb-6">
                <a href="/admin/wisata" class="text-green-600 hover:text-green-800">
                    <i class="fas fa-arrow-left"></i> Kembali
                </a>
                <h2 class="text-2xl font-bold text-green-800">Edit Wisata</h2>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6">
                <form method="POST" action="/admin/wisata/update/{{.Wisata.ID}}" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Nama Wisata <span class="text-red-500">*</span></label>
                        <input type="text" name="nama_wisata" value="{{.Wisata.NamaWisata}}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Deskripsi <span class="text-red-500">*</span></label>
                        <textarea name="deskripsi" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" required>{{.Wisata.Deskripsi}}</textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Lokasi <span class="text-red-500">*</span></label>
                        <input type="text" name="lokasi" value="{{.Wisata.Lokasi}}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" required>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Harga Tiket</label>
                            <input type="text" name="harga_tiket" value="{{.Wisata.HargaTiket}}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Jam Operasional</label>
                            <input type="text" name="jam_operasional" value="{{.Wisata.JamOperasional}}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Status</label>
                        <select name="status" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                            <option value="buka" {{if eq .Wisata.Status "buka"}}selected{{end}}>Buka</option>
                            <option value="tutup" {{if eq .Wisata.Status "tutup"}}selected{{end}}>Tutup</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Gambar Saat Ini</label>
                        {{if .Wisata.Gambar}}
                            <img src="/static/uploads/wisata/{{.Wisata.Gambar}}" class="h-24 w-auto rounded mb-2">
                        {{else}}
                            <p class="text-gray-400 text-sm">Belum ada gambar</p>
                        {{end}}
                        <input type="file" name="gambar" accept="image/*" class="w-full border border-gray-300 rounded-lg px-4 py-2 mt-2">
                        <p class="text-xs text-gray-400 mt-1">Kosongkan jika tidak ingin mengganti gambar</p>
                    </div>
                    <div class="flex gap-3">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg transition">Update</button>
                        <a href="/admin/wisata" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
{{end}}
