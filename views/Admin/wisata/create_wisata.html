{{define "admin/wisata/create"}}

{{template "admin_header.html" .}}

{{template "admin_sidebar.html" .}}

<div class="main">
    <div class="header">
        <h1>Tambah Wisata</h1>
    </div>

    <form action="/admin/wisata" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Nama Wisata</label>
            <input type="text" name="nama_wisata" required>
        </div>
        <div class="form-group">
            <label>Deskripsi</label>
            <textarea name="deskripsi" rows="5"></textarea>
        </div>
        <div class="form-group">
            <label>Lokasi</label>
            <input type="text" name="lokasi">
        </div>
        <div class="form-group">
            <label>Harga Tiket</label>
            <input type="text" name="harga_tiket">
        </div>
        <div class="form-group">
            <label>Jam Operasional</label>
            <input type="text" name="jam_operasional">
        </div>
        <div class="form-group">
            <label>Gambar</label>
            <input type="file" name="gambar">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="aktif">Aktif</option>
                <option value="tutup">Tutup</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Simpan</button>
        <a href="{{ route "admin.wisata.index" }}" class="btn btn-secondary">Batal</a>
    </form>
</div>

{{template "footer.html" .}}

{{end}}
